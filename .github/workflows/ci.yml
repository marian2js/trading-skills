name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository
        run: python scripts/validate_repo.py

      - name: Check catalog and README drift
        run: python scripts/build_catalog.py --check

  skill-doctor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Skill Doctor
        uses: marian2js/skill-doctor@v0.1.0
        with:
          directory: .
          strictness: default
          fail-on: error
          verbose: true
